name: Serv00 注册监测

on:
  workflow_dispatch:
  schedule:
    - cron: '*/4 * * * *'    # 每4分钟检测一次

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检查 Serv00 是否开放
        id: check
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://www.serv00.com/register-account/)
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=open" >> $GITHUB_OUTPUT
            echo "msg=🎉 Serv00 可能已开放注册！快去注册！" >> $GITHUB_OUTPUT
          else
            echo "status=closed" >> $GITHUB_OUTPUT
            echo "msg=Serv00 当前已满" >> $GITHUB_OUTPUT
          fi

      - name: 发送 Telegram 通知
        if: steps.check.outputs.status == 'open'     # 只有开放才通知
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            🔔 Serv00 注册监测
            
            ${{ steps.check.outputs.msg }}
            
            时间：$(date +"%Y-%m-%d %H:%M:%S")
            直达链接：https://www.serv00.com/register-account/
