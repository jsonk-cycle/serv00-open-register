name: 检测Serv00开放注册

on:
  workflow_dispatch:
  schedule:
    - cron: '*/3 * * * *'   # 每3分钟检查一次

jobs:
  run-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查 Serv00 注册状态
        id: check
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://www.serv00.com/register-account/)
          echo "HTTP_CODE=$RESPONSE" >> $GITHUB_OUTPUT
          
          if [[ "$RESPONSE" == "200" ]]; then
            echo "status=open" >> $GITHUB_OUTPUT
            echo "message=🔥 Serv00 可能已开放注册！快去注册！" >> $GITHUB_OUTPUT
          else
            echo "status=closed" >> $GITHUB_OUTPUT
            echo "message=Serv00 当前已满，还不能注册" >> $GITHUB_OUTPUT
          fi

      - name: 发送 Telegram 通知
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            🔔 Serv00 注册监测
            ${{ steps.check.outputs.message }}
            
            时间：${{ github.event.repository.updated_at }}
